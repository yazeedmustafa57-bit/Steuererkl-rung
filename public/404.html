<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SteuerWert</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f5f5f5;
        color: #0C0B0A;
      }
      .container { text-align: center; padding: 2rem; }
      h1 { font-size: 2rem; margin-bottom: 1rem; }
      p { color: #666; margin-bottom: 2rem; }
      .spinner {
        width: 40px; height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #ADEE68;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .redirect-msg { margin-top: 1.5rem; font-size: 0.875rem; color: #999; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <h1>SteuerWert wird geladen…</h1>
      <p>Bitte einen Moment Geduld</p>
      <div class="redirect-msg">Weiterleitung zur App</div>
    </div>
    <!-- Redirect to the SPA root -->
    <script>
      (function() {
        var base = '/Steuererkl-rung/';
        var path = location.pathname.replace(/^\/Steuererkl-rung/, '') || '/';
        window.location.replace(base + '#!' + path);
      })();
    </script>
  </body>
</html>
